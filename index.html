<html lang="he">
<head>
  <meta charset="UTF-8"/>

  <meta name="theme-color" content="#0F1117"/>
  <title>Shiftly</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;background:#0F1117;color:#E2E8F0;}
    input,button,textarea,select{font-family:inherit;}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0F1117;color:#94A3B8;font-family:monospace;gap:12px;font-size:13px;z-index:999;}
    #errbox{position:fixed;inset:0;background:#0F1117;color:#F87171;font-family:monospace;padding:20px;display:none;flex-direction:column;gap:8px;overflow:auto;font-size:11px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:#2D3748;border-radius:2px;}
  </style>
</head>
<body>
<div id="loading">
  <div style="width:36px;height:36px;border:3px solid #1E293B;border-top:3px solid #3B82F6;border-radius:50%;animation:spin 1s linear infinite"></div>
  <div>Loading Shiftly...</div>
  <div id="loadstep" style="font-size:10px;opacity:0.5">Initialising...</div>
</div>
<div id="errbox"></div>
<div id="root"></div>

<script>
function showErr(title, detail) {
  document.getElementById('loading').style.display='none';
  var b=document.getElementById('errbox');
  b.style.display='flex';
  b.innerHTML='<strong style="font-size:18px;color:#F87171">'+title+'</strong><pre style="background:#1E293B;padding:12px;border-radius:6px;white-space:pre-wrap;word-break:break-all;font-size:10px">'+detail+'</pre>';
}
window.onerror=function(m,s,l,c,e){showErr('Runtime Error', m+'\nLine:'+l+'\n'+(e&&e.stack||''));return true;};
window.onunhandledrejection=function(e){showErr('Promise Error',(e.reason&&e.reason.message)||String(e.reason));};

document.getElementById('loadstep').textContent='Setting up storage...';
window.storage={
  get:async function(k){var v=localStorage.getItem(k);if(v===null)throw new Error('Not found: '+k);return{key:k,value:v};},
  set:async function(k,v){try{localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));return{key:k,value:v};}catch(e){return null;}},
  delete:async function(k){localStorage.removeItem(k);return{key:k,deleted:true};},
  list:async function(p){var keys=Object.keys(localStorage).filter(function(k){return!p||k.startsWith(p);});return{keys:keys};}
};
</script>

function holidayRate(date){ const h=getHoliday(date); if(!h)return null; return h[1]===200?HOLIDAY_R:SHABBAT_R; }

// ── Helpers ───────────────────────────────────────────────
const todayD = () => new Date(new Date().toDateString());
const parseT  = s => { const m = String(s||"").trim().match(/^(\d{1,2}):(\d{2})$/); return m?{h:+m[1],m:+m[2]}:null; };
const toMin   = t => t ? t.h*60+t.m : null;
const fmt2    = n => String(n).padStart(2,"0");
const fmtT    = t => t ? `${fmt2(t.h)}:${fmt2(t.m)}` : null;
const daysBetween = (a,b) => Math.floor((b-a)/86400000);
// Parse YYYY-MM-DD as LOCAL date (not UTC) to avoid timezone shift issues
function parseLocalDate(ds){ if(!ds)return null; const[y,m,d]=ds.split("-").map(Number); return new Date(y,m-1,d); }
const fmtDate  = ds => ds ? parseLocalDate(ds).toLocaleDateString("he-IL",{weekday:"short",day:"2-digit",month:"2-digit",year:"2-digit"}) : "";
const fmtShort = ds => ds ? parseLocalDate(ds).toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit"}) : "";
const fmtFull  = ds => ds ? parseLocalDate(ds).toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"}) : "";

function shiftHrs(s,e,cross){ if(!s||!e)return null; let d=toMin(e)-toMin(s); if(cross||d<0)d+=1440; return +(d/60).toFixed(2); }
function shiftHrsNum(sh){ const s=parseT(sh.startTime),e=parseT(sh.endTime); if(!s||!e)return null; let d=toMin(e)-toMin(s); if(sh.crossesMidnight||d<0)d+=1440; return +(d/60).toFixed(1); }

function shiftStatus(sh){
  if(sh.flagged&&!sh.resolved) return "flagged";
  const todayStr=new Date().toLocaleDateString("en-CA");
  const isToday=sh.date===todayStr;
  const isFuture=sh.date>todayStr;
  const isPast=sh.date<todayStr;
  // Future shifts = always estimated
  if(isFuture) return "future";
  // No end time
  if(!sh.endTime){
    if(isToday) return "future"; // flexible end today
    // Past with no end time and no clock confirmation = flag it
    if(isPast&&sh.clockStatus!=="confirmed") return "flagged";
    return "closing"; // past clocked but no recorded end
  }
  // Has end time
  if(sh.clockStatus==="clocked_in") return "clocked_in";
  // Past/today: pending if tips field was never touched (empty string or undefined)
  // "0" is a valid entry meaning "no tips" — counts as confirmed
  // Check if this is a span shift (crosses 18:00 boundary)
  const stH2=parseT(sh.startTime)?.h??0;
  const etH2=parseT(sh.endTime)?.h??0;
  const etM2=parseT(sh.endTime)?.m??0;
  const isSpan=sh.endTime&&stH2<18&&(sh.crossesMidnight||etH2>18||(etH2===18&&etM2>0));
  if(isSpan){
    // Span shift: need BOTH morning and evening tips entered
    const mEntered=sh.morningTips!==undefined&&sh.morningTips!==null&&sh.morningTips!=="";
    const eEntered=sh.eveningTips!==undefined&&sh.eveningTips!==null&&sh.eveningTips!=="";
    if(!mEntered||!eEntered) return "pending";

}
function sMeta(st){

// Detect night shift: 2+ hours between 22:00-06:00
function isNightShift(startTime, endTime, crossesMidnight){
  const s=parseT(startTime), e=parseT(endTime);
  if(!s||!e) return false;
  // Count minutes between 22:00-06:00 (1320-360 min, wrapping midnight)
  let nightMins=0, cur=toMin(s), end=toMin(e);

  for(let m=cur;m<end;m++){
    const mm=m%1440;
    if(mm>=1320||mm<360) nightMins++;

// Calculate pay for a single shift, with optional priorHrs (for double shift OT continuity)
function calcShiftPay(sh, priorHrs=0){
  const s=parseT(sh.startTime),e=parseT(sh.endTime);
  const hrs=shiftHrs(s,e,sh.crossesMidnight); if(!hrs)return null;
  // Shabbat/Holiday: flat rate, no OT tiers
  // Erev days: only premium if shift starts at/after 18:00

  const holEntry=getHoliday(sh.date);
  const erev=holEntry?.[0]?.startsWith("Erev");
  const fullDayErev=erev&&holEntry?.[0]?.includes("Yom HaAtzmaut");
  const erevQualifies=!erev||fullDayErev||(parseT(sh.startTime)&&toMin(parseT(sh.startTime))>=18*60);
  const isPremium=(sh.shiftType==="Holiday"||sh.shiftType==="Shabbat"||!!holidayRate(sh.date))&&erevQualifies;
  if(isPremium){
    const rate=sh.shiftType==="Holiday"?HOLIDAY_R:holidayRate(sh.date)||SHABBAT_R;
    // Shabbat rate only applies until 18:00; after 18:00 it drops to normal rate
    if(sh.shiftType==="Shabbat"&&s&&e){
      const startMin=toMin(s), endMin=toMin(e)+(sh.crossesMidnight?1440:0);
      if(startMin<18*60&&endMin>18*60+10){
        const mornHrs=Math.max(0,(18*60-startMin)/60);
        const evenHrs=Math.max(0,(endMin-18*60)/60);
        const mornTips=parseFloat(sh.morningTips)||0;
        const evenTips=parseFloat(sh.eveningTips)||0;
        const tips=parseFloat(sh.myTipCash)||(mornTips||evenTips?(mornTips+evenTips):0);

        return{hrs,gross:+(base+tips).toFixed(2),net:+(base+tips-PENSION*hrs).toFixed(2),wage:+(base-PENSION*hrs).toFixed(2),tips,
          breakdown:{base,ot1:0,ot2:0,reg:hrs,otHrs1:0,otHrs2:0,threshold:hrs,isNight:false,isPremium:true,shabbatSplit:true,mornHrs:+mornHrs.toFixed(2),evenHrs:+evenHrs.toFixed(2)}};
      }
    }
    const tips=parseFloat(sh.myTipCash)||0;
    return{hrs,gross:+(rate*hrs+tips).toFixed(2),net:+(rate*hrs+tips-PENSION*hrs).toFixed(2),wage:+(rate*hrs-PENSION*hrs).toFixed(2),tips,breakdown:{base:+(rate*hrs).toFixed(2),ot1:0,ot2:0,reg:hrs,otHrs1:0,otHrs2:0,threshold:hrs,isNight:false,isPremium:true}};
  }

  const night=isNightShift(sh.startTime,sh.endTime,sh.crossesMidnight);
  const thresh=night?OT_THRESH_NIGHT:OT_THRESH_DAY;

  const totalHrsSoFar=priorHrs+hrs;
  const regHrs=Math.max(0,Math.min(hrs, thresh-priorHrs));           // regular hours in THIS shift
  const ot1Hrs=Math.max(0,Math.min(hrs-Math.max(0,thresh-priorHrs), 2-Math.max(0,2-(Math.max(0,priorHrs-thresh))))); // 125% hours
  const ot2Hrs=Math.max(0,hrs-regHrs-ot1Hrs);                        // 150% hours
  const base=regHrs*BASE_RATE + ot1Hrs*BASE_RATE*1.25 + ot2Hrs*BASE_RATE*1.5;
  const tips=parseFloat(sh.myTipCash)||0;
  return{hrs,gross:+(base+tips).toFixed(2),net:+(base+tips-PENSION*hrs).toFixed(2),wage:+(base-PENSION*hrs).toFixed(2),tips,
    breakdown:{base:+base.toFixed(2),ot1:+(ot1Hrs*BASE_RATE*1.25).toFixed(2),ot2:+(ot2Hrs*BASE_RATE*1.5).toFixed(2),
      reg:+regHrs.toFixed(2),otHrs1:+ot1Hrs.toFixed(2),otHrs2:+ot2Hrs.toFixed(2),threshold:thresh,isNight:night,isPremium:false}};
}

function calcPay(sh){ return calcShiftPay(sh, sh.priorDayHrs||0); }
// Returns the effective base hourly rate for a shift (44 normal, 66 Shabbat, 88 Holiday)
function shiftBaseRate(sh){
  if(sh.shiftType==="Holiday") return HOLIDAY_R;
  if(sh.shiftType==="Shabbat") return SHABBAT_R;
  const hol=getHoliday(sh.date);
  if(hol) return hol[1]===200?HOLIDAY_R:SHABBAT_R;
  return BASE_RATE;
}

// Detect if a shift spans the 18:00 morning/evening tip pool boundary
function isSpanShift(sh){
  const s=parseT(sh.startTime), e=parseT(sh.endTime);
  if(!s||!e) return false;
  const startMin=toMin(s), endMin=toMin(e)+(sh.crossesMidnight?1440:0);
  return startMin<18*60 && endMin>18*60;
}

// Split hours at 18:00 boundary for tip calculation
function spanHourSplit(sh){
  const s=parseT(sh.startTime), e=parseT(sh.endTime);
  if(!s||!e) return null;
  const startMin=toMin(s), endMin=toMin(e)+(sh.crossesMidnight?1440:0);
  const boundary=18*60;
  const morningHrs=Math.max(0,(Math.min(endMin,boundary)-startMin))/60;
  const eveningHrs=Math.max(0,endMin-Math.max(startMin,boundary))/60;
  return{morningHrs:+morningHrs.toFixed(2), eveningHrs:+eveningHrs.toFixed(2)};
}

function isResolved(sh){ const tipsEntered=sh.myTipCash!==undefined&&sh.myTipCash!==null&&sh.myTipCash!==""; return !!(sh.endTime&&tipsEntered&&(sh.tipsCollected||sh.tipsPending||sh.myTipCash==="0")); }
function weekKeyForDate(ds){
  // Use local date to avoid timezone shifts on mobile
  const d=new Date(ds);
  while(d.getDay()!==0) d.setDate(d.getDate()-1);
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function getISOWeek(d){ const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7); }

function buildWeekGrid(year){
  const weeks=[];let d=new Date(year,0,1);
  while(d.getDay()!==0)d.setDate(d.getDate()-1);
  while(true){ const s=new Date(d),e=new Date(d);e.setDate(e.getDate()+6); if(s.getFullYear()>year)break; weeks.push({key:(()=>{const y=s.getFullYear(),m=String(s.getMonth()+1).padStart(2,"0"),d=String(s.getDate()).padStart(2,"0");return `${y}-${m}-${d}`;})(),start:s,end:e,weekNum:getISOWeek(s)}); d.setDate(d.getDate()+7); }
  return weeks.filter(w=>w.start.getFullYear()===year||w.end.getFullYear()===year);
}

// ── Notifications ─────────────────────────────────────────
function getNotifs(shifts,dismissed){
  const now=todayD(),out=[];
  shifts.filter(s=>!s.endTime&&!s.resolved).forEach(sh=>{
    const d=daysBetween(new Date(sh.date),now);if(d<0)return;
    const key=`closing_${sh.id}_${now.toISOString().slice(0,10)}`;
    if(!dismissed.includes(key)){
      const msg=d===0?"Shift today has no end time — fill in when you clock out.":
                d===1?"Yesterday's shift has no end time recorded.":
                `${d} days ago — shift still missing end time.`;
      out.push({key,shiftId:sh.id,type:"closing",title:`Missing end time — ${fmtDate(sh.date)}`,body:msg,color:"#F87171",icon:"🔓"});
    }
  });
  shifts.filter(s=>{
    const todayStr=new Date().toLocaleDateString("en-CA");
    const[y,m,d]=s.date.split("-").map(Number);
    const shiftLocal=new Date(y,m-1,d);
    const todayLocal=new Date(new Date().toLocaleDateString("en-CA"));
    const diff=Math.round((shiftLocal-todayLocal)/86400000);
    return diff>=0&&diff<=1&&shiftStatus(s)==="future";
  }).forEach(sh=>{
    const todayStr=new Date().toLocaleDateString("en-CA");
    const isToday=sh.date===todayStr;
    const key=`future_${sh.id}_${now.toISOString().slice(0,10)}`;
    if(!dismissed.includes(key)){
      const timeStr=sh.startTime?sh.startTime+(sh.endTime?" → "+sh.endTime:" → open end"):"time TBD";
      const body=isToday?`Shift starts at ${timeStr}. Remember to enter tips after.`
                        :`${timeStr}. Starts tomorrow — remember to note your tips.`;
      out.push({key,shiftId:sh.id,type:"future",title:`${isToday?"Today":"Tomorrow"}: ${sh.shiftType} shift — ${fmtDate(sh.date)}`,body,color:"#FBBF24",icon:"◷"});
    }
  });
  shifts.filter(s=>shiftStatus(s)==="confirmed"&&s.tipsPending&&!s.tipsCollected).forEach(sh=>{
    const key=`pending_${sh.id}_${now.toISOString().slice(0,10)}`;
    if(!dismissed.includes(key))out.push({key,shiftId:sh.id,type:"pending",title:`Pending tip cash — ${fmtDate(sh.date)}`,body:`₪${sh.myTipCash||"?"} not yet collected.`,color:"#A78BFA",icon:"💸"});
  });
  // Flagged shifts
  shifts.filter(s=>s.flagged&&!s.resolved).forEach(sh=>{
    const key=`flagged_${sh.id}`;
    if(!dismissed.includes(key))out.push({key,shiftId:sh.id,type:"flagged",title:`Flagged shift — ${fmtDate(sh.date)}`,body:sh.notes||"This shift has been flagged for review.",color:"#F87171",icon:"⚑"});
  });

  // Pending — only notify AFTER the shift has actually ended
  const nowMs=Date.now();
  shifts.filter(s=>shiftStatus(s)==="pending"&&!s.resolved).forEach(sh=>{
    // Calculate when the shift ends (date + endTime, accounting for midnight crossover)
    if(sh.endTime){
      const[y,mo,d]=sh.date.split("-").map(Number);
      const et=parseT(sh.endTime);
      const shiftEnd=new Date(y,mo-1,d,et.h,et.m);
      if(sh.crossesMidnight) shiftEnd.setDate(shiftEnd.getDate()+1);
      if(shiftEnd.getTime()>nowMs) return; // shift not over yet
    } else {
      // No end time — only notify if date is in the past
      const todayStr=new Date().toLocaleDateString("en-CA");
      if(sh.date>=todayStr) return;
    }
    const key=`pending_tips_${sh.id}`;
    if(!dismissed.includes(key)){
      // Build specific message based on what's missing
      const hasEndTime=!!sh.endTime;
      const hasClock=sh.clockStatus==="confirmed"||sh.clockStatus==="clocked_in";
      let body="";
      // Check span shift partial tips
      const stH3=parseT(sh.startTime)?.h??0;
      const etH3=parseT(sh.endTime)?.h??0;
      const etM3=parseT(sh.endTime)?.m??0;
      const isSpanN=sh.endTime&&stH3<18&&(sh.crossesMidnight||etH3>18||(etH3===18&&etM3>0));
      const mEntered=sh.morningTips!==undefined&&sh.morningTips!==null&&sh.morningTips!=="";
      const eEntered=sh.eveningTips!==undefined&&sh.eveningTips!==null&&sh.eveningTips!=="";
      if(isSpanN&&!mEntered&&!eEntered) body="Split shift — enter both morning and evening tips.";
      else if(isSpanN&&!mEntered) body="Split shift — morning tips (till 18:00) still needed.";
      else if(isSpanN&&!eEntered) body="Split shift — evening tips (18:00+) still needed.";
      else if(!hasEndTime&&!hasClock) body="No clock-out recorded yet. Enter end time after your shift.";
      else if(!hasEndTime) body="End time not recorded. Fill in your clock-out time.";
      else if(!hasClock) body="Clock-out not in schedule yet — enter tips when ready.";

      out.push({key,shiftId:sh.id,type:"pending",
        title:`Pending — ${fmtDate(sh.date)} (${sh.shiftType})`,
        body,color:"#FBBF24",icon:"○"});
    }
  });
  return out;
}

// ── ZIP / XLSX parser ─────────────────────────────────────
function readZip(u8){
  const v=new DataView(u8.buffer,u8.byteOffset,u8.byteLength);const files={};let eocd=-1;
  for(let i=u8.length-22;i>=0;i--){if(u8[i]===0x50&&u8[i+1]===0x4B&&u8[i+2]===0x05&&u8[i+3]===0x06){eocd=i;break;}}
  if(eocd===-1)return files;
  const cdOff=v.getUint32(eocd+16,true),cdCnt=v.getUint16(eocd+8,true);let pos=cdOff;
  for(let i=0;i<cdCnt;i++){
    if(v.getUint32(pos,true)!==0x02014B50)break;
    const cm=v.getUint16(pos+10,true),cs=v.getUint32(pos+20,true),fl=v.getUint16(pos+28,true),el=v.getUint16(pos+30,true),cl=v.getUint16(pos+32,true),lo=v.getUint32(pos+42,true);
    const name=new TextDecoder().decode(u8.slice(pos+46,pos+46+fl));
    files[name]={cm,cs,lo};pos+=46+fl+el+cl;
  }
  for(const name in files){const f=files[name],lh=f.lo,fl2=v.getUint16(lh+26,true),el2=v.getUint16(lh+28,true);f.data=u8.slice(lh+30+fl2+el2,lh+30+fl2+el2+f.cs);}
  return files;
}
async function inflate(data){
  const ds=new DecompressionStream("deflate-raw"),w=ds.writable.getWriter(),r=ds.readable.getReader();
  w.write(data);w.close();const chunks=[];
  while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
  const out=new Uint8Array(chunks.reduce((s,c)=>s+c.length,0));let off=0;for(const c of chunks){out.set(c,off);off+=c.length;}
  return out;
}
async function getXml(files,name){const f=files[name];if(!f)return null;let b=f.data;if(f.cm===8)b=await inflate(b);return new TextDecoder().decode(b);}

// Extract xlsx internal modification date
async function getXlsxModifiedDate(files){
  const coreXml=await getXml(files,"docProps/core.xml");
  if(!coreXml)return null;
  const m=coreXml.match(/dcterms:modified[^>]*>([^<]+)</);
  if(m)return new Date(m[1].trim()).getTime();
  const c2=coreXml.match(/dcterms:created[^>]*>([^<]+)</);
  if(c2)return new Date(c2[1].trim()).getTime();
  return null;
}
function countConfirmedClocks(myShifts){
  return (myShifts||[]).filter(s=>s.clockStatus==="confirmed"||s.clockStatus==="clocked_in").length;
}

async function parseSchedule(u8){
  const files=readZip(u8);if(!Object.keys(files).length)throw new Error("Not a valid xlsx file");
  const ss=[];
  const ssXml=await getXml(files,"xl/sharedStrings.xml");
  if(ssXml){
    // Use regex instead of DOMParser to preserve newlines inside <t> elements
    // DOMParser collapses whitespace when xml:space="preserve" is absent
    const siMatches=ssXml.match(/<si>[\s\S]*?<\/si>/g)||[];
    siMatches.forEach(si=>{
      const tMatches=si.match(/<t[^>]*>([\s\S]*?)<\/t>/g)||[];
      const text=tMatches.map(t=>t.replace(/<t[^>]*>/,"").replace(/<\/t>/,"")).join("");
      ss.push(text);
    });
  }
  // Parse styles to get fill colors by style index
  const greenRgb="FF5CB85C", orangeRgb="FFED9C28"; // clock-in colors
  const fillColors={}; // styleIndex -> rgb
  const stylesXml=await getXml(files,"xl/styles.xml");
  if(stylesXml){
    const styDoc=new DOMParser().parseFromString(stylesXml,"text/xml");
    // Build fills array
    const fills=[];
    styDoc.querySelectorAll("fills>fill>patternFill>fgColor").forEach((fg,i)=>{
      fills.push(fg.getAttribute("rgb")||fg.getAttribute("theme")||"");
    });
    // Map xf (cell format) index to fill index
    styDoc.querySelectorAll("cellXfs>xf").forEach((xf,i)=>{
      const fillId=parseInt(xf.getAttribute("fillId")||"0");
      fillColors[i]=fills[fillId]||"";
    });
  }
  function isClockedColor(styleIdx){
    const rgb=(fillColors[parseInt(styleIdx)||0]||"").toUpperCase();
    return rgb==="FF5CB85C"  // green = clocked in (normal)
        || rgb==="FFF0AD4E"  // orange = clocked out after hours
        || rgb==="5CB85C"
        || rgb==="F0AD4E";
  }

  const relsXml=await getXml(files,"xl/_rels/workbook.xml.rels"),wbXml=await getXml(files,"xl/workbook.xml");
  let sheetPath="xl/worksheets/sheet1.xml";
  if(relsXml&&wbXml){
    const sid=new DOMParser().parseFromString(wbXml,"text/xml").querySelector("sheet")?.getAttribute("r:id");
    if(sid)new DOMParser().parseFromString(relsXml,"text/xml").querySelectorAll("Relationship").forEach(r=>{if(r.getAttribute("Id")===sid){const t=r.getAttribute("Target").replace(/^\.\//,"");sheetPath=t.startsWith("xl/")?t:"xl/"+t;}});
  }
  const wsXml=await getXml(files,sheetPath);if(!wsXml)throw new Error("Could not read worksheet");
  const rowMap={};
  new DOMParser().parseFromString(wsXml,"text/xml").querySelectorAll("row").forEach(rowEl=>{
    const ri=parseInt(rowEl.getAttribute("r"))-1;const cells={};
    rowEl.querySelectorAll("c").forEach(c=>{
      const ref=c.getAttribute("r"),ci=ref.replace(/[0-9]/g,"").split("").reduce((a,ch)=>a*26+(ch.charCodeAt(0)-64),0)-1;
      const t=c.getAttribute("t"),v=c.querySelector("v")?.textContent||"";
      // Resolve cell value
      // IMPORTANT: Some xlsx exports omit t="s" on shared string cells
      // Strategy: if t is missing/empty AND value is a valid integer, ALWAYS try ss lookup first
      let cellVal;
      const tVal = t||""; // normalize null/undefined to ""
      if(tVal==="s"){
        cellVal=ss[parseInt(v)]||"";
      } else if(tVal==="inlineStr"){
        cellVal=(c.querySelector("t")||{textContent:""}).textContent||"";
      } else if(tVal===""&&v!==""&&/^\d+$/.test(v.trim())){
        // No type + numeric value = very likely a shared string index
        const idx=parseInt(v);
        cellVal=(idx>=0&&idx<ss.length)?ss[idx]:v;
      } else {
        cellVal=v;
      }
      cells[ci]=cellVal;
      cells["_s_"+ci]=c.getAttribute("s")||"";
    });
    rowMap[ri]=cells;
  });
  const maxRow=Math.max(...Object.keys(rowMap).map(Number));const rows=[];
  for(let r=0;r<=maxRow;r++){const cells=rowMap[r]||{};const mc=Object.keys(cells).filter(k=>!k.startsWith("_")).length?Math.max(...Object.keys(cells).filter(k=>!k.startsWith("_")).map(Number).filter(n=>!isNaN(n))):-1;const arr=[];for(let c=0;c<=Math.max(mc,20);c++)arr.push(cells[c]||"");rows.push(arr);}
  let hRow=-1,dateCols=[];
  // Try multiple date formats across first 15 rows
  for(let r=0;r<Math.min(15,rows.length);r++){
    const mc=[];
    rows[r].forEach((c,i)=>{
      // Normalize: replace newlines/tabs so multiline cells like "א'\n12/04/2026" still match
      const s=String(c).replace(/[\r\n\t]+/g," ");
      let m=null,date=null;
      // DD/MM/YYYY or D/MM/YYYY
      m=s.match(/(\d{1,2})\/(\d{2})\/(\d{4})/);
      if(m) date=`${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
      // YYYY-MM-DD
      if(!date){m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)date=m[0];}
      // Excel serial date number (days since 1899-12-30)
      if(!date&&!isNaN(s.trim())&&s.trim()!==""){
        const n=parseInt(s.trim());

    });

    if(mc.length>=4&&r>0){hRow=r;dateCols=mc;break;}
  }
  if(hRow===-1){

  }
  const dates=dateCols.map(d=>d.date).sort(),weekStart=dates[0],weekEnd=dates[dates.length-1],weekKey=weekStart;
  const nameParts=MY_NAME.trim().toLowerCase().split(" ").filter(p=>p.length>1);
  const allWorkers={},myShifts=[];
  for(let r=hRow+1;r<rows.length;r++){
    const row=rows[r];
    for(const{col,date}of dateCols){
      const cell=String(row[col]||"").trim();if(!cell||cell.match(/^\d/)||cell.length<2)continue;
      const nxt=rows[r+1]||[];
      const startTime=parseT(row[col+1])||parseT(nxt[col+1]),endTime=parseT(row[col])||parseT(nxt[col]);
      const st=startTime||endTime,et=startTime?endTime:null,cross=st&&et&&toMin(et)<toMin(st);
      const hrs=st&&et?(()=>{let d=toMin(et)-toMin(st);if(cross||d<0)d+=1440;return +(d/60).toFixed(2);})():null;
      const dow=new Date(date).getDay();
      const hol=getHoliday(date);
      const erevDay=hol&&hol[0].startsWith("Erev");
      // Erev: shiftType determined at render time based on start hour (erevQualifies in calcShiftPay)
      const shiftType=hol&&hol[1]===200&&!erevDay?"Holiday":hol&&hol[1]===150&&!erevDay?"Shabbat":dow===6?"Shabbat":"Normal";
      // Note: erev shifts get shiftType "Normal" and rely on calcShiftPay's erev check
      // Detect clock status from cell colors
      // col+1 = start time cell, col = end time cell
      const startStyleIdx = row["_s_"+(col+1)] || (nxt["_s_"+(col+1)]);
      const endStyleIdx   = row["_s_"+col]   || (nxt["_s_"+col]);
      const startClocked  = isClockedColor(startStyleIdx);
      const endClocked    = isClockedColor(endStyleIdx);
      // clockStatus: "confirmed"=both clocked, "clocked_in"=only start, "scheduled"=neither
      const clockStatus = startClocked&&endClocked?"confirmed":startClocked?"clocked_in":"scheduled";
      const entry={id:`${date}_${fmtT(st)}_${Math.random().toString(36).slice(2,6)}`,date,shiftType,startTime:fmtT(st),endTime:fmtT(et),crossesMidnight:!!cross,rawName:cell,hrs,isEvening:!!(st&&st.h>=16),isMorning:!!(st&&st.h<16),isClosing:!et,dayOfWeek:dow,clockStatus,totalShiftHrs:"",tipPool:"",myTipCash:"",breakHrs:0,notes:"",gcalEventId:null,tipsCollected:false,tipsPending:false,flagged:false,resolved:false};
      if(!allWorkers[cell.trim()])allWorkers[cell.trim()]=[];
      allWorkers[cell.trim()].push({date,startTime:fmtT(st),endTime:fmtT(et),hrs,shiftType});
      if(nameParts.some(p=>cell.toLowerCase().includes(p)))myShifts.push(entry);
    }
  }
  const rosterSummary=Object.entries(allWorkers).map(([name,shifts])=>({name,shifts:shifts.length,totalHrs:shifts.reduce((s,sh)=>s+(sh.hrs||0),0)})).sort((a,b)=>b.totalHrs-a.totalHrs);

  // Detect double shifts: same date, multiple entries → mark with priorDayHrs for OT continuity
  const byDate={};
  myShifts.forEach(sh=>{ if(!byDate[sh.date])byDate[sh.date]=[]; byDate[sh.date].push(sh); });
  const processedShifts=myShifts.map(sh=>{
    const dayShifts=byDate[sh.date];
    if(dayShifts.length<2) return sh;
    // Sort by start time to find earlier shift
    dayShifts.sort((a,b)=>(toMin(parseT(a.startTime))||0)-(toMin(parseT(b.startTime))||0));
    const idx=dayShifts.findIndex(s=>s.id===sh.id);
    const priorHrs=dayShifts.slice(0,idx).reduce((sum,s)=>sum+(shiftHrs(parseT(s.startTime),parseT(s.endTime),s.crossesMidnight)||0),0);
    return{...sh, priorDayHrs:+priorHrs.toFixed(2), isDoubleShift:true, doubleShiftIdx:idx, doubleShiftTotal:dayShifts.length};
  });

  const fileModifiedDate=await getXlsxModifiedDate(files);
  return{weekKey,weekStart,weekEnd,myShifts:processedShifts,rosterSummary,workerCount:Object.keys(allWorkers).length,fileModifiedDate};
}

async function gcReq(token,method,path,body){
  const url=`${CAL_API}${path}`;
  const opts={method,headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"}};
  if(body) opts.body=JSON.stringify(body);
  let r;
  try{ r=await fetch(url,opts); }
  catch(netErr){ throw new Error(`Network error: ${netErr.message}`); }
  if(!r.ok){
    let errMsg=`HTTP ${r.status}`;
    try{ const e=await r.json(); errMsg=e?.error?.message||e?.error?.status||errMsg; }catch{}
    throw new Error(`${errMsg} (${method} ${path.slice(0,40)})`);
  }
  if(method==="DELETE") return null;
  return r.json();
}

          {tipsPerHr!=null&&<span style={{fontSize:8,color:colors.muted}}>₪{baseRate.toFixed(2)} base + ₪{tipsPerHr.toFixed(2)} tips</span>}
          {tipsPerHr==null&&<span style={{fontSize:8,color:colors.muted}}>base rate</span>}
        </div>

          <input key={"dh_"+sh.id+"_"+sh.myTipCash} style={inpFn({color:totalPerHr!=null?colors.text:colors.muted})} placeholder={"₪"+baseRate+"/h"}
            defaultValue={hrlyDefaultVal}

            defaultValue={tipsDefaultVal}

            onBlur={e=>{
              const raw=parseFloat(e.target.value.trim());

        </div>
      )}

  );
}

  const r=await fetch(`${DRIVE_API}/files?q=${q}&fields=files(id,name,modifiedTime)`,
    {headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok) return null;
  const d=await r.json();
  return d.files?.[0]||null;
}

async function driveRead(token, fileId){
  const r=await fetch(`${DRIVE_API}/files/${fileId}?alt=media`,
    {headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok) return null;
  return r.json();
}

async function driveWrite(token, fileId, data){
  const body=JSON.stringify(data);
  const url=fileId
    ? `${DRIVE_UPLOAD}/files/${fileId}?uploadType=media`
    : `${DRIVE_UPLOAD}/files?uploadType=multipart`;
  if(fileId){
    // Update existing file
    const r=await fetch(url,{method:"PATCH",
      headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
      body});
    return r.ok?await r.json():null;
  } else {
    // Create new file with metadata
    const meta=JSON.stringify({name:DRIVE_FILE_NAME,mimeType:"application/json"});
    const boundary="shifts_tracker_boundary";
    const multipart=[
      `--${boundary}`,
      "Content-Type: application/json; charset=UTF-8",
      "",meta,"",
      `--${boundary}`,
      "Content-Type: application/json",
      "",body,
      `--${boundary}--`
    ].join("\r\n");
    const r=await fetch(`${DRIVE_UPLOAD}/files?uploadType=multipart`,{
      method:"POST",
      headers:{Authorization:`Bearer ${token}`,
        "Content-Type":`multipart/related; boundary=${boundary}`},
      body:multipart});
    return r.ok?await r.json():null;
  }
}

  function dedupeShifts(list){
    // Remove duplicates: keep the most complete version for each date+approximate_start

    for(const sh of list){
      const startH=parseT(sh.startTime)?.h??0;
      const key=`${sh.date}_${startH}`; // group by date + start hour
      if(!seen.has(key)){seen.set(key,sh);}
      else{
        const existing=seen.get(key);
        // Keep the one with more data: clocked > end time > tips
        const score=s=>(s.clockStatus==="confirmed"?4:s.clockStatus==="clocked_in"?3:0)+(s.endTime?2:0)+(s.tipPool&&s.tipPool!="0"?1:0)+(s.myTipCash&&s.myTipCash!="0"?1:0);

        const isUpdate=newIndex.includes(weekKey);

          const existingModDate=existingMeta.fileModifiedDate||0;
          const existingClocks=countConfirmedClocks(existingMeta.myShifts||[]);
          const newClocks=countConfirmedClocks(myShifts);
          const incomingIsOlder=fileModifiedDate&&existingModDate&&fileModifiedDate<existingModDate;
          if(incomingIsOlder&&newClocks<existingClocks){
            results.push({file:file.name,ok:false,msg:`Skipped — older file (${newClocks} vs ${existingClocks} clocked)`});

        if(mergedShifts===null){try{const r=await window.storage.get(SHIFTS_KEY);if(r)mergedShifts=JSON.parse(r.value);}catch{} if(!mergedShifts)mergedShifts=[];}
        const weekDates=new Set(myShifts.map(s=>s.date));
        const keepOutside=mergedShifts.filter(s=>!weekDates.has(s.date));
        const userTouched=s=>((s.myTipCash!==undefined&&s.myTipCash!==null&&s.myTipCash!=="")||s.tipsCollected||s.tipsPending||s.resolved||(s.flagged===true));
        const keepResolved=mergedShifts.filter(s=>weekDates.has(s.date)&&userTouched(s));
        const freshShifts=myShifts.map(newSh=>{
          const resolvedMatch=keepResolved.find(s=>s.date===newSh.date&&Math.abs((parseT(s.startTime)?.h??0)-(parseT(newSh.startTime)?.h??0))<=1);
          if(resolvedMatch)return{...resolvedMatch,startTime:newSh.startTime,endTime:newSh.endTime||resolvedMatch.endTime,clockStatus:newSh.clockStatus,crossesMidnight:newSh.crossesMidnight,shiftType:newSh.shiftType,totalShiftHrs:""};
          return{...newSh,totalShiftHrs:""};
        });
        mergedShifts=[...keepOutside,...freshShifts].sort((a,b)=>a.date.localeCompare(b.date));
        results.push({file:file.name,ok:true,weekKey,weekStart,weekEnd,shifts:myShifts.length,isUpdate});

    const ok=results.filter(r=>r.ok);
    const skipped=results.filter(r=>!r.ok);

    else if(ok.length>1){msg=`✓ ${ok.length} schedules uploaded: ${ok.map(r=>fmtShort(r.weekStart)).join(", ")}`;}
    if(skipped.length)msg+=(msg?" · ":"")+`${skipped.length} skipped: ${skipped.map(r=>r.file.split(".")[0]+": "+r.msg).join("; ")}`;
    setArchiveMsg({ok:skipped.length===0,text:msg||"No files processed"});
    if(ok.length>=1){
      setSelWeek(ok[0].weekKey);
      setArchiveView(ok.length===1?"detail":"timeline");
    } else {
      setArchiveView("timeline");
    }
    setMainTab("archive");
  }catch(err){
    setArchiveMsg({ok:false,text:"Upload error: "+err.message});
  }finally{
    safeSetImporting(false);

  }

  function buildGCalUrl(sh){
    const pay=calcPay(sh);
    const[y,mo,d]=sh.date.split("-").map(Number);
    const st=parseT(sh.startTime)||{h:18,m:0};
    const sD=new Date(y,mo-1,d,st.h,st.m);
    let eD;
    if(sh.endTime){const et=parseT(sh.endTime);eD=new Date(y,mo-1,d,et.h,et.m);if(sh.crossesMidnight||eD<=sD)eD.setDate(eD.getDate()+1);}
    else eD=new Date(sD.getTime()+6*3600000);
    const pad=n=>String(n).padStart(2,"0");
    const fmt=dt=>`${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
    const hol=getHoliday(sh.date);
    const title=encodeURIComponent(`[${sh.shiftType}] Shift${pay?` - ${pay.net} net`:""}`);
    const details=encodeURIComponent([`Shift: ${sh.shiftType}`,`Hours: ${shiftHrsNum(sh)||"?"}h`,pay?`Pay: ${pay.net} net / ${pay.gross} gross`:"",sh.myTipCash?`Tips: ${sh.myTipCash}`:"Tips: not entered",hol?`Holiday: ${hol[0]} (${hol[1]}%)`:""].filter(Boolean).join("\n"));
    const dates=`${fmt(sD)}/${fmt(eD)}`;
    return `https://calendar.google.com/calendar/r/eventedit?text=${title}&dates=${dates}&details=${details}&sf=true`;
  }

                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            <label style={{fontSize:9,color:C.muted,letterSpacing:"1px",textTransform:"uppercase"}}>₪/h rate</label>
                            <div style={{background:C.dim,border:`1px solid ${C.border}`,borderRadius:6,color:tipsPerHr!=null?C.text:C.muted,padding:"7px 10px",fontSize:12,fontFamily:mono,letterSpacing:"-0.3px"}}>
                              ₪{displayRate}/h
                            </div>
                            {tipsPerHr!=null&&<span style={{fontSize:8,color:C.muted}}>₪{(basePerHr||baseRate).toFixed(2)} base + ₪{tipsPerHr.toFixed(2)} tips</span>}
                            {tipsPerHr==null&&<span style={{fontSize:8,color:C.muted}}>base rate</span>}
                          </div>
                        );
                        return(<>
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            <label style={{fontSize:9,color:C.muted,letterSpacing:"1px",textTransform:"uppercase"}}>₪/h rate</label>
                            <div style={{background:C.dim,border:`1px solid ${C.border}`,borderRadius:6,color:tipsPerHr!=null?C.text:C.muted,padding:"7px 10px",fontSize:12,fontFamily:mono,letterSpacing:"-0.3px"}}>
                              ₪{displayRate}/h
                            </div>
                            {tipsPerHr!=null&&<span style={{fontSize:8,color:C.muted}}>₪{(basePerHr||baseRate).toFixed(2)} base + ₪{tipsPerHr.toFixed(2)} tips</span>}
                            {tipsPerHr==null&&<span style={{fontSize:8,color:C.muted}}>base rate</span>}
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            <label style={{fontSize:9,color:C.muted,letterSpacing:"1px",textTransform:"uppercase"}}>Total ₪/h received</label>
                            <input
                              key={`a_hrly_${sh.id}_${sh.myTipCash}`}
                              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:totalPerHr!=null?C.text:C.muted,padding:"6px 8px",fontSize:12,fontFamily:mono,outline:"none"}}
                              placeholder={`₪${baseRate}/h`}
                              defaultValue={hrlyDefaultVal}
                              onFocus={e=>{const v=parseFloat(e.target.value);if(!isNaN(v))e.target.value=v.toFixed(2);e.target.select();}}
                              onBlur={e=>{
                                const raw=parseFloat(e.target.value.replace("₪/h","").trim());
                                if(isNaN(raw)||segHrs<=0){e.target.value=hrlyDefaultVal;return;}
                                const tipRate=raw>effectiveBase?raw-effectiveBase:0;
                                updArchive(selWeek,sh.id,{myTipCash:+(tipRate*segHrs).toFixed(2)+""});
                              }}
                            />
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            <label style={{fontSize:9,color:C.muted,letterSpacing:"1px",textTransform:"uppercase"}}>Total Tips ₪</label>
                            <input
                              key={`a_tips_${sh.id}_${sh.myTipCash}`}
                              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:tipsPerHr!=null?C.text:C.muted,padding:"6px 8px",fontSize:12,fontFamily:mono,outline:"none"}}
                              placeholder="0"
                              defaultValue={tipsDefaultVal}
                              onFocus={e=>{e.target.select();}}
                              onBlur={e=>{
                                const raw=parseFloat(e.target.value.trim());
                                if(isNaN(raw)){return;}
                                updArchive(selWeek,sh.id,{myTipCash:+(raw).toFixed(2)+""});
                              }}
                            />
                          </div>
                        </>);
                      })()}
                      {(()=>{
                        const stH=parseT(sh.startTime)?.h??0;
                        const etH=parseT(sh.endTime)?.h??0;
                        const etM=parseT(sh.endTime)?.m??0;
                        const splitPool=sh.endTime&&stH<18&&(sh.crossesMidnight||etH>18||(etH===18&&etM>10));
                        if(!splitPool) return null;
                        const morningMins=Math.max(0,(18*60)-(stH*60+(parseT(sh.startTime)?.m??0)));
                        const totalMins=(()=>{let d=toMin(parseT(sh.endTime))-toMin(parseT(sh.startTime));if(sh.crossesMidnight||d<0)d+=1440;return d;})();
                        const eveningMins=Math.max(0,totalMins-morningMins);
                        const mH=+(morningMins/60).toFixed(2);
                        const eH=+(eveningMins/60).toFixed(2);
                        const mTips=parseFloat(sh.morningTips||"");
                        const eTips=parseFloat(sh.eveningTips||"");
                        const totalTips=(!isNaN(mTips)?mTips:0)+(!isNaN(eTips)?eTips:0);
                        const mBr=shiftBaseRate(sh);
                        const eBr=sh.shiftType==="Shabbat"?BASE_RATE:mBr;
                        const mTipsPerHr=(!isNaN(mTips)&&sh.morningTips!=="")&&mH>0?(mTips/mH):null;
                        const eTipsPerHr=(!isNaN(eTips)&&sh.eveningTips!=="")&&eH>0?(eTips/eH):null;
                        const mHrlyDef=mTipsPerHr!=null?(mBr+mTipsPerHr).toFixed(2):"";
                        const eHrlyDef=eTipsPerHr!=null?(eBr+eTipsPerHr).toFixed(2):"";
                        const mTipsDef=!isNaN(mTips)&&sh.morningTips!==""?mTips.toFixed(2):"";
                        const eTipsDef=!isNaN(eTips)&&sh.eveningTips!==""?eTips.toFixed(2):"";
                        const aInp={background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,padding:"6px 8px",fontSize:12,fontFamily:mono,outline:"none"};
                        return(
                          <div style={{gridColumn:"1 / -1",background:`${C.purple}08`,border:`1px solid ${C.purple}20`,borderRadius:7,padding:"8px 10px",marginTop:2}}>
                            <div style={{fontSize:9,color:C.purple,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>⚡ Split Tip Pools ({mH.toFixed(1)}h morning + {eH.toFixed(1)}h evening)</div>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:9,color:C.yellow,letterSpacing:"1px",textTransform:"uppercase"}}>☀ Morning Tips ₪</label>
                                <input key={`asp_mt_${sh.id}_${sh.morningTips}`} style={aInp} placeholder="0" defaultValue={mTipsDef}
                                  onFocus={e=>{e.target.select();}}
                                  onBlur={e=>{
                                    const raw=parseFloat(e.target.value.trim());
                                    if(isNaN(raw)){return;}
                                    const v=+(raw).toFixed(2);
                                    updArchive(selWeek,sh.id,{morningTips:v+"",myTipCash:(v+(!isNaN(eTips)?eTips:0))>0?(v+(!isNaN(eTips)?eTips:0))+"":sh.myTipCash});
                                  }}/>
                                {mTipsPerHr!=null&&<span style={{fontSize:8,color:C.muted}}>₪{mBr}/h base + ₪{mTipsPerHr.toFixed(2)}/h tips</span>}
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:9,color:C.acc,letterSpacing:"1px",textTransform:"uppercase"}}>🌙 Evening Tips ₪</label>
                                <input key={`asp_et_${sh.id}_${sh.eveningTips}`} style={aInp} placeholder="0" defaultValue={eTipsDef}
                                  onFocus={e=>{e.target.select();}}
                                  onBlur={e=>{
                                    const raw=parseFloat(e.target.value.trim());
                                    if(isNaN(raw)){return;}
                                    const v=+(raw).toFixed(2);
                                    updArchive(selWeek,sh.id,{eveningTips:v+"",myTipCash:((!isNaN(mTips)?mTips:0)+v)>0?((!isNaN(mTips)?mTips:0)+v)+"":sh.myTipCash});
                                  }}/>
                                {eTipsPerHr!=null&&<span style={{fontSize:8,color:C.muted}}>₪{eBr}/h base + ₪{eTipsPerHr.toFixed(2)}/h tips</span>}
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:9,color:C.yellow,letterSpacing:"1px",textTransform:"uppercase"}}>☀ Morning Tip ₪/H</label>
                                <input key={`asp_mh_${sh.id}_${sh.morningTips}`} style={aInp} placeholder="tip ₪/h or total ₪/h" defaultValue={mHrlyDef}
                                  onFocus={e=>{const v=parseFloat(e.target.value);if(!isNaN(v))e.target.value=v.toFixed(2);e.target.select();}}
                                  onBlur={e=>{
                                    const raw=parseFloat(e.target.value.replace("₪/h","").trim());
                                    if(isNaN(raw)||mH<=0){e.target.value=mHrlyDef;return;}
                                    const tipRate=raw>mBr?raw-mBr:raw;
                                    const v=+(tipRate*mH).toFixed(2);
                                    updArchive(selWeek,sh.id,{morningTips:v+"",myTipCash:(v+(!isNaN(eTips)?eTips:0))>0?(v+(!isNaN(eTips)?eTips:0))+"":sh.myTipCash});
                                  }}/>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <label style={{fontSize:9,color:C.acc,letterSpacing:"1px",textTransform:"uppercase"}}>🌙 Evening Tip ₪/H</label>
                                <input key={`asp_eh_${sh.id}_${sh.eveningTips}`} style={aInp} placeholder="tip ₪/h or total ₪/h" defaultValue={eHrlyDef}
                                  onFocus={e=>{const v=parseFloat(e.target.value);if(!isNaN(v))e.target.value=v.toFixed(2);e.target.select();}}
                                  onBlur={e=>{
                                    const raw=parseFloat(e.target.value.replace("₪/h","").trim());
                                    if(isNaN(raw)||eH<=0){e.target.value=eHrlyDef;return;}
                                    const tipRate=raw>eBr?raw-eBr:raw;
                                    const v=+(tipRate*eH).toFixed(2);
                                    updArchive(selWeek,sh.id,{eveningTips:v+"",myTipCash:((!isNaN(mTips)?mTips:0)+v)>0?((!isNaN(mTips)?mTips:0)+v)+"":sh.myTipCash});
                                  }}/>
                              </div>
                            </div>
                            {totalTips>0&&(
                              <div style={{fontSize:10,color:C.purple,fontWeight:700,marginTop:6,display:"flex",gap:8,alignItems:"center"}}>
                                <span>Total: ₪{totalTips.toFixed(0)}</span>
                                <span style={{fontSize:9,color:C.muted,fontWeight:400}}>☀₪{isNaN(mTips)?0:mTips.toFixed(0)} + 🌙₪{isNaN(eTips)?0:eTips.toFixed(0)}</span>
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                  </div>
                ))}

                {(selData.rosterSummary||[]).length>0&&(
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:9,color:C.muted,letterSpacing:"2px",textTransform:"uppercase",marginBottom:7}}>Full Roster</div>
                    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:9,overflow:"hidden"}}>
                      {selData.rosterSummary.map((worker,i)=>{
                        const isMe=worker.name.toLowerCase().split(" ").some(p=>p.length>1&&MY_NAME.toLowerCase().includes(p));
                        const maxH=Math.max(...selData.rosterSummary.map(w=>w.totalHrs),1);
                        return(
                          <div key={worker.name} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 11px",borderBottom:i<selData.rosterSummary.length-1?`1px solid ${C.border}`:"none",background:isMe?`${C.acc}08`:"transparent"}}>
                            <div style={{width:5,height:5,borderRadius:"50%",background:isMe?C.acc:C.dim,flexShrink:0}}/>
                            <div style={{width:110,fontSize:10,color:isMe?C.acc:C.text,fontWeight:isMe?"700":"400",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{worker.name}</div>
                            <div style={{flex:1,display:"flex",alignItems:"center",gap:5}}><Bar value={worker.totalHrs} max={maxH} color={isMe?C.acc:C.dim} height={5}/><span style={{fontSize:9,color:isMe?C.acc:C.muted,width:28,flexShrink:0}}>{worker.totalHrs.toFixed(0)}h</span></div>
                            <div style={{fontSize:9,color:C.muted,width:14,textAlign:"right"}}>{worker.shifts}s</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ══════════════ PATTERNS TAB ══════════════ */}
        {mainTab==="patterns"&&(
          <div>
            {allArchived.length===0?(
              <div style={{textAlign:"center",padding:"44px 20px",color:C.muted}}>
                <div style={{fontSize:36,marginBottom:10}}>📊</div>
                <div style={{fontFamily:sans,fontWeight:700,fontSize:13,color:C.text,marginBottom:5}}>No data yet</div>
                <div style={{fontSize:11}}>Upload schedules in the Archive tab to see patterns</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>

                {/* Day of week */}
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px"}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:10}}>Day of Week Frequency</div>
                  {DAYS.map((day,i)=>(
                    <div key={day} style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
                      <div style={{width:26,fontSize:10,color:i===6?C.purple:i===5?C.yellow:C.muted,fontWeight:i>=5?"700":"400"}}>{day}</div>
                      <Bar value={dayFreq[i]} max={maxDayFreq} color={i===6?C.purple:i===5?C.yellow:C.acc}/>
                      <div style={{width:18,fontSize:10,color:C.muted,textAlign:"right"}}>{dayFreq[i]}</div>
                      <div style={{width:30,fontSize:9,color:C.muted}}>{allArchived.length>0?Math.round((dayFreq[i]/allArchived.length)*100)+"%":""}</div>
                    </div>
                  ))}
                </div>

                {/* Morning vs Evening */}
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px"}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:10}}>Morning vs Evening Split</div>
                  {[["🌅 Morning (<16:00)",morningCount,C.yellow],["🌙 Evening (≥16:00)",eveningCount,C.acc]].map(([label,val,color])=>(
                    <div key={label} style={{marginBottom:9}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:10,color}}>{label}</span><span style={{fontSize:10,color,fontWeight:700}}>{val} ({allArchived.length>0?Math.round((val/allArchived.length)*100):0}%)</span></div>
                      <Bar value={val} max={allArchived.length} color={color} height={8}/>
                    </div>
                  ))}
                </div>

                {/* Shift length distribution */}
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px"}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:10}}>Shift Length Distribution</div>
                  {[["Under 4h",lenBuckets[0],C.red],["4–6 hours",lenBuckets[1],C.yellow],["6–8 hours",lenBuckets[2],C.acc],["8h+",lenBuckets[3],C.green]].map(([label,val,color])=>(
                    <div key={label} style={{display:"flex",alignItems:"center",gap:9,marginBottom:7}}>
                      <div style={{width:58,fontSize:10,color:C.muted}}>{label}</div>
                      <Bar value={val} max={maxLen} color={color}/>
                      <div style={{width:14,fontSize:10,color:C.muted,textAlign:"right"}}>{val}</div>
                    </div>
                  ))}
                </div>

                {/* Weekly hrs: you vs team */}
                {weeklyTrend.length>1&&(
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px"}}>
                    <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:5}}>Weekly Hours: You vs Team Average</div>
                    <div style={{display:"flex",gap:12,marginBottom:9}}>
                      {[[C.acc,"You"],[C.dim,"Team avg"]].map(([c,l])=>(
                        <div key={l} style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:c}}><div style={{width:9,height:3,background:c,borderRadius:1}}/>{l}</div>
                      ))}
                    </div>
                    {weeklyTrend.map(w=>(
                      <div key={w.key} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                        <div style={{width:36,fontSize:8,color:C.muted,flexShrink:0}}>{fmtShort(w.weekStart)}</div>
                        <div style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
                          <div style={{display:"flex",alignItems:"center",gap:4}}><Bar value={w.myHrs} max={maxWeekHrs} color={C.acc} height={5}/><span style={{fontSize:8,color:C.acc,width:26}}>{w.myHrs}h</span></div>
                          <div style={{display:"flex",alignItems:"center",gap:4}}><Bar value={w.teamAvgHrs} max={maxWeekHrs} color={C.dim} height={5}/><span style={{fontSize:8,color:C.muted,width:26}}>{w.teamAvgHrs}h</span></div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Monthly hours */}
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px"}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"1px",textTransform:"uppercase",marginBottom:10}}>Monthly Hours</div>
                  {MONTHS.map((mn,i)=>{
                    if(monthlyHrs[i]===0)return null;
                    return(
                      <div key={mn} style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
                        <div style={{width:26,fontSize:10,color:C.muted}}>{mn}</div>
                        <Bar value={monthlyHrs[i]} max={maxMonthHrs} color={C.green} height={8}/>
                        <div style={{width:34,fontSize:10,color:C.green,textAlign:"right",fontWeight:700}}>{monthlyHrs[i].toFixed(0)}h</div>
                      </div>
                    );
                  })}
                </div>

              </div>
            )}
          </div>
        )}

      </div>

      {/* ── Auth toast notification ── */}
      {authToast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
          background:authToast.ok?`${C.green}EE`:`${C.red}EE`,
          color:"#fff",borderRadius:10,padding:"12px 20px",
          fontSize:12,fontWeight:700,fontFamily:mono,
          boxShadow:"0 4px 20px #00000060",zIndex:2000,
          animation:"slideIn .3s ease",whiteSpace:"nowrap",
          maxWidth:"90vw",textAlign:"center"}}>
          {authToast.text}
        </div>
      )}

      {/* ── Reset confirmation modal ── */}
      {resetStep>0&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
          <div style={{background:C.card,border:`2px solid ${C.red}`,borderRadius:14,padding:"24px 20px",maxWidth:340,width:"100%",fontFamily:mono}}>
            {resetStep===1&&(
              <>
                <div style={{fontSize:16,fontWeight:700,color:C.red,marginBottom:10}}>🗑 Reset All Data?</div>
                <div style={{fontSize:11,color:C.muted,lineHeight:1.7,marginBottom:16}}>
                  This will permanently delete:<br/>
                  • All shifts &amp; records<br/>
                  • All archived schedules &amp; files<br/>
                  • All notifications<br/>
                  • Google Calendar connection<br/><br/>
                  <span style={{color:C.red,fontWeight:700}}>This cannot be undone.</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setResetStep(0)} style={{flex:1,background:C.dim,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:mono}}>Cancel</button>
                  <button onClick={()=>setResetStep(2)} style={{flex:1,background:`${C.red}25`,border:`1px solid ${C.red}`,borderRadius:8,color:C.red,padding:"10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:mono}}>Yes, continue</button>
                </div>
              </>
            )}
            {resetStep===2&&(
              <>
                <div style={{fontSize:16,fontWeight:700,color:C.red,marginBottom:10}}>⚠ Last chance</div>
                <div style={{fontSize:12,color:C.text,marginBottom:20,lineHeight:1.6}}>Permanently delete <strong>everything</strong>? There is no undo.</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setResetStep(0)} style={{flex:1,background:C.dim,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:mono}}>Cancel</button>
                  <button onClick={doReset} style={{flex:2,background:C.red,border:"none",borderRadius:8,color:"#fff",padding:"10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:mono}}>🗑 Delete Everything</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}


  const container = document.getElementById('root');
  const root = ReactDOM.createRoot(container);
  root.render(React.createElement(App));
  document.getElementById('loading').style.display = 'none';
} catch(e) {
  showErr('App Error', e.message + '\n\n' + (e.stack||''));
}
</script>
</body>
</html>
